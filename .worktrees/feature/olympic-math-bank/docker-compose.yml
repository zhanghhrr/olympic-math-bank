version: '3.8'

services:
  # PostgreSQL 数据库
  # 生产环境请通过 .env 文件设置 POSTGRES_PASSWORD，勿使用默认密码
  postgres:
    image: postgres:15-alpine
    container_name: olympic-math-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-olympic_math}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存（可选，预留）
  redis:
    image: redis:7-alpine
    container_name: olympic-math-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO 对象存储（可选，用于文件存储）
  # 生产环境请通过 .env 文件设置 MINIO_ROOT_USER / MINIO_ROOT_PASSWORD
  minio:
    image: minio/minio:latest
    container_name: olympic-math-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olympic-math-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me-postgres}@postgres:5432/${POSTGRES_DB:-olympic_math}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MINERU_API_TOKEN=${MINERU_API_TOKEN:-}
      - MINERU_API_URL=${MINERU_API_URL:-}
    volumes:
      # 持久化上传目录
      - uploads_data:/app/uploads
      # PDF 导出文件存储
      - exports_data:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Puppeteer + Chromium 需要较大内存，生产环境建议至少 1.5G
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:
  exports_data:
